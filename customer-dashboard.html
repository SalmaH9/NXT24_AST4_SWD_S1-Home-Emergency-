<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - HomeFix</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        .dashboard {
            padding: 100px 24px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: calc(100vh - 80px);
        }
        .dashboard-header {
            margin-bottom: 40px;
        }
        .dashboard-header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }
        .dashboard-card {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .dashboard-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(10,102,194,0.1), transparent);
            transition: left 0.5s;
        }
        .dashboard-card:hover::before {
            left: 100%;
        }
        .dashboard-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .dashboard-card i {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        .dashboard-card h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--gray-900);
        }
        .dashboard-card p {
            color: var(--gray-600);
        }
        .logout-btn {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220,53,69,0.4);
        }
        .welcome-badge {
            display: inline-block;
            padding: 5px 15px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 50px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar scrolled">
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fas fa-home"></i><span>FIXORA</span></a>
            <button onclick="homefix.logout()" class="logout-btn">Logout</button>
        </div>
    </nav>
    
    <div class="dashboard">
        <div class="dashboard-header" data-aos="fade-right">
            <h1>Customer Dashboard</h1>
            <p>Welcome back! Manage your service requests here.</p>
            <span class="welcome-badge"><i class="fas fa-check-circle"></i> Verified Account</span>
        </div>
        <div class="dashboard-grid">
            <div class="dashboard-card" data-aos="zoom-in" data-aos-delay="100" onclick="showFeatureAlert('New Request')">
                <i class="fas fa-plus-circle" style="color: #0A66C2;"></i>
                <h3>New Request</h3>
                <p>Submit a new service request for your home emergency.</p>
            </div>
            <div class="dashboard-card" data-aos="zoom-in" data-aos-delay="200" onclick="showFeatureAlert('My Requests')">
                <i class="fas fa-history" style="color: #0A66C2;"></i>
                <h3>My Requests</h3>
                <p>View and track your ongoing and past service requests.</p>
            </div>
            <div class="dashboard-card" data-aos="zoom-in" data-aos-delay="300" onclick="showFeatureAlert('Reviews')">
                <i class="fas fa-star" style="color: #0A66C2;"></i>
                <h3>Reviews</h3>
                <p>Rate and review completed services.</p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden">
        <i class="fas fa-info-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
    <script>
        if (typeof AOS !== 'undefined') AOS.init({ duration: 600, once: true });
        
        function showFeatureAlert(feature) {
            if (typeof homefix !== 'undefined' && homefix.showToast) {
                homefix.showToast(`${feature} feature is coming soon!`, 'info');
            } else {
                alert(`${feature} feature is coming soon!`);
            }
        }
        
        if (!homefix.checkAuth()) {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
