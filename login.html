<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HomeFix | Secure Access</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Login Page Specific Styles - HomeFix Theme Colors */
        :root {
            --primary: #0A66C2;
            --primary-dark: #084e96;
            --primary-light: #e6f0fa;
            --primary-soft: #d4e4f5;
            --secondary: #F5F7FA;
            --white: #FFFFFF;
            --gray-100: #F8F9FA;
            --gray-200: #E9ECEF;
            --gray-600: #6C757D;
            --gray-800: #343A40;
        }

        .auth-page {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--secondary) 50%, var(--white) 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background - Blue Theme */
        .auth-bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .auth-bg-animation .shape {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(10,102,194,0.08) 0%, rgba(10,102,194,0.02) 100%);
            animation: floatShape 20s infinite ease-in-out;
        }

        .shape-1 { width: 500px; height: 500px; top: -150px; right: -150px; animation-delay: 0s; }
        .shape-2 { width: 400px; height: 400px; bottom: -100px; left: -100px; animation-delay: -5s; }
        .shape-3 { width: 250px; height: 250px; top: 40%; left: 5%; animation-delay: -10s; }
        .shape-4 { width: 180px; height: 180px; bottom: 20%; right: 10%; animation-delay: -3s; }
        .shape-5 { width: 120px; height: 120px; top: 20%; right: 25%; animation-delay: -7s; }
        .shape-6 { width: 300px; height: 300px; top: 60%; right: 35%; animation-delay: -12s; }

        @keyframes floatShape {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.4; }
            50% { transform: translateY(-50px) scale(1.1); opacity: 0.6; }
        }

        /* Grid Pattern Overlay */
        .grid-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(10,102,194,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(10,102,194,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.15;
            animation: particleFloat 15s infinite linear;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.2; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .auth-container {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 24px 60px 24px;
            position: relative;
            z-index: 10;
        }

        .auth-card {
            background: var(--white);
            border-radius: 32px;
            box-shadow: 0 30px 60px -20px rgba(10, 102, 194, 0.25), 0 0 0 1px rgba(10, 102, 194, 0.08);
            width: 100%;
            max-width: 420px;
            padding: 40px 36px;
            animation: cardReveal 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark), var(--primary-light));
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .auth-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 70px -20px rgba(10, 102, 194, 0.3), 0 0 0 1px rgba(10, 102, 194, 0.15);
        }

        @keyframes cardReveal {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeSlideDown 0.6s ease;
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--gray-800);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .auth-header h1 span {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .auth-header p {
            color: var(--gray-600);
            font-size: 0.9rem;
        }

        /* Role Selection */
        .role-selection {
            margin-bottom: 28px;
            animation: fadeSlideUp 0.6s ease 0.05s both;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .role-label {
            display: block;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 12px;
            font-size: 0.85rem;
        }

        .role-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .role-option {
            cursor: pointer;
        }

        .role-option input {
            display: none;
        }

        .role-card {
            padding: 14px 12px;
            border: 2px solid var(--gray-200);
            border-radius: 16px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--white);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .role-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(10,102,194,0.08), transparent);
            transition: left 0.5s ease;
        }

        .role-card:hover::before {
            left: 100%;
        }

        .role-option input:checked + .role-card {
            border-color: var(--primary);
            background: linear-gradient(135deg, var(--primary-light), var(--primary-soft));
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(10, 102, 194, 0.15);
        }

        .role-card i {
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 8px;
            display: block;
            transition: transform 0.3s ease;
        }

        .role-card:hover i {
            transform: scale(1.1);
        }

        .role-card span {
            display: block;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 4px;
            font-size: 0.85rem;
        }

        .role-card small {
            display: block;
            color: var(--gray-600);
            font-size: 0.7rem;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
            animation: fadeSlideUp 0.6s ease 0.1s both;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i:first-child {
            position: absolute;
            left: 16px;
            color: var(--gray-600);
            font-size: 1rem;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .input-group input {
            width: 100%;
            padding: 13px 45px 13px 48px;
            border: 2px solid var(--gray-200);
            border-radius: 14px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: var(--white);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(10, 102, 194, 0.1);
            transform: translateY(-1px);
        }

        .input-group input:focus + i:first-child {
            color: var(--primary);
        }

        .input-group input.error {
            border-color: #dc3545;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: var(--gray-600);
            cursor: pointer;
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            transition: all 0.3s ease;
            border-radius: 50%;
        }

        .toggle-password:hover {
            color: var(--primary);
            background: rgba(10, 102, 194, 0.08);
            transform: scale(1.05);
        }

        .error-message {
            display: block;
            color: #dc3545;
            font-size: 0.7rem;
            margin-top: 6px;
            min-height: 18px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            animation: fadeSlideUp 0.6s ease 0.15s both;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--gray-600);
            transition: color 0.3s ease;
        }

        .checkbox-label:hover {
            color: var(--primary);
        }

        .checkbox-label input {
            display: none;
        }

        .checkmark {
            width: 18px;
            height: 18px;
            border: 2px solid var(--gray-400);
            border-radius: 5px;
            position: relative;
            transition: all 0.2s ease;
        }

        .checkbox-label input:checked + .checkmark {
            background: var(--primary);
            border-color: var(--primary);
            animation: checkPop 0.3s ease;
        }

        @keyframes checkPop {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .checkmark::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 2px;
            width: 5px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .checkbox-label input:checked + .checkmark::after {
            opacity: 1;
        }

        .forgot-password {
            color: var(--primary);
            font-size: 0.85rem;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .forgot-password::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .forgot-password:hover::after {
            width: 100%;
        }

        /* Button Styles */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 13px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            box-shadow: 0 4px 15px rgba(10, 102, 194, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(10, 102, 194, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: var(--gray-600);
            font-size: 0.8rem;
            animation: fadeSlideUp 0.6s ease 0.2s both;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gray-200), transparent);
        }

        .auth-divider span {
            padding: 0 16px;
        }

        .social-login {
            display: flex;
            gap: 15px;
            animation: fadeSlideUp 0.6s ease 0.25s both;
        }

        .btn-social {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 11px;
            border: 2px solid var(--gray-200);
            border-radius: 14px;
            background: var(--white);
            color: var(--gray-600);
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-social::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(10,102,194,0.08), transparent);
            transition: left 0.5s ease;
        }

        .btn-social:hover::before {
            left: 100%;
        }

        .btn-social:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .btn-google i {
            color: #DB4437;
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        .btn-google:hover i {
            transform: scale(1.1);
        }

        .btn-apple i {
            color: #1a1a1a;
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        .btn-apple:hover i {
            transform: scale(1.1);
        }

        .auth-footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid var(--gray-200);
            animation: fadeSlideUp 0.6s ease 0.3s both;
        }

        .auth-footer p {
            color: var(--gray-600);
            font-size: 0.85rem;
        }

        .auth-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            position: relative;
            transition: all 0.3s ease;
        }

        .auth-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .auth-link:hover::after {
            width: 100%;
        }

        /* Navbar for auth pages */
        .navbar-auth {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(10, 102, 194, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .navbar-auth.scrolled {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 2px 20px rgba(10, 102, 194, 0.08);
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray-600);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 20px;
            border-radius: 50px;
            transition: all 0.3s ease;
            border: 2px solid var(--gray-200);
            background: var(--white);
            position: relative;
            overflow: hidden;
        }

        .btn-back::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(10,102,194,0.08), transparent);
            transition: left 0.4s ease;
        }

        .btn-back:hover::before {
            left: 100%;
        }

        .btn-back:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateX(-3px);
            box-shadow: 0 5px 15px rgba(10, 102, 194, 0.1);
        }

        .btn-back i {
            transition: transform 0.3s ease;
        }

        .btn-back:hover i {
            transform: translateX(-4px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.02);
            gap: 12px;
        }

        .logo i {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 14px 24px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9999;
            transform: translateX(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 10px 30px rgba(10, 102, 194, 0.25);
            font-size: 0.9rem;
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            z-index: 9998;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--primary-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 28px 24px;
                max-width: 100%;
                margin: 0 16px;
            }
            .role-options {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .social-login {
                flex-direction: column;
                gap: 12px;
            }
            .auth-container {
                padding: 100px 16px 40px 16px;
            }
            .btn-back span {
                display: none;
            }
            .btn-back {
                padding: 10px 14px;
            }
            .btn-back i {
                margin: 0;
            }
        }
    </style>
</head>
<body class="auth-page">
    <!-- Animated Background - Blue Theme -->
    <div class="auth-bg-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
        <div class="shape shape-6"></div>
    </div>
    <div class="grid-pattern"></div>
    <div class="particles" id="particles"></div>

    <nav class="navbar-auth" id="navbarAuth">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-home"></i>
                <span>FIXORA</span>
            </a>
            <a href="index.html" class="btn-back">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Home</span>
            </a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to access your account</p>
            </div>

            <form id="loginForm">
                <div class="role-selection">
                    <label class="role-label">I am a:</label>
                    <div class="role-options">
                        <label class="role-option">
                            <input type="radio" name="role" value="customer" id="roleCustomer" checked>
                            <div class="role-card">
                                <i class="fas fa-user"></i>
                                <span>Customer</span>
                                <small>Need home services</small>
                            </div>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="provider" id="roleProvider">
                            <div class="role-card">
                                <i class="fas fa-user-tie"></i>
                                <span>Provider</span>
                                <small>Offer services</small>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                    <div class="spinner hidden"></div>
                </button>
            </form>

            <div class="auth-divider">
                <span>or continue with</span>
            </div>

            <div class="social-login">
                <button class="btn-social btn-google">
                    <i class="fab fa-google"></i>
                    Google
                </button>
                <button class="btn-social btn-apple">
                    <i class="fab fa-apple"></i>
                    Apple
                </button>
            </div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="#" class="auth-link">Sign up</a></p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Login successful!</span>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Navbar scroll effect
            const navbar = document.getElementById('navbarAuth');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 10) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });

            // Create particles
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 80; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = 10 + Math.random() * 12 + 's';
                particle.style.width = Math.random() * 5 + 2 + 'px';
                particle.style.height = particle.style.width;
                particlesContainer.appendChild(particle);
            }

            // Preselect role from URL
            const urlParams = new URLSearchParams(window.location.search);
            const preselectedRole = urlParams.get('role');
            if (preselectedRole === 'provider') {
                document.getElementById('roleProvider').checked = true;
            } else if (preselectedRole === 'customer') {
                document.getElementById('roleCustomer').checked = true;
            }

            // Password toggle
            const toggleBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            if (toggleBtn && passwordInput) {
                toggleBtn.addEventListener('click', function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    const icon = this.querySelector('i');
                    icon.classList.toggle('fa-eye');
                    icon.classList.toggle('fa-eye-slash');
                });
            }

            // Login form handler
            const loginForm = document.getElementById('loginForm');
            const loadingOverlay = document.getElementById('loadingOverlay');
            
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const email = document.getElementById('email').value.trim();
                    const password = document.getElementById('password').value;
                    const role = document.querySelector('input[name="role"]:checked')?.value;
                    const rememberMe = document.getElementById('rememberMe')?.checked;
                    
                    if (!email || !password) {
                        showToast('Please fill in all fields', 'error');
                        return;
                    }
                    
                    if (!email.includes('@') || !email.includes('.')) {
                        showToast('Please enter a valid email address', 'error');
                        return;
                    }
                    
                    if (password.length < 6) {
                        showToast('Password must be at least 6 characters', 'error');
                        return;
                    }
                    
                    // Show loading overlay
                    loadingOverlay.classList.add('active');
                    
                    const userData = { email, role, isLoggedIn: true, loginTime: new Date().toISOString() };
                    
                    if (rememberMe) {
                        localStorage.setItem('homefix_user', JSON.stringify(userData));
                    } else {
                        sessionStorage.setItem('homefix_user', JSON.stringify(userData));
                    }
                    
                    setTimeout(() => {
                        loadingOverlay.classList.remove('active');
                        showToast('Login successful! Redirecting...', 'success');
                        
                        setTimeout(() => {
                            if (role === 'provider') {
                                window.location.href = 'provider-dashboard.html';
                            } else {
                                window.location.href = 'customer-dashboard.html';
                            }
                        }, 1000);
                    }, 1200);
                });
            }
        });

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            if (!toast) return;
            
            const messageSpan = document.getElementById('toastMessage');
            if (messageSpan) messageSpan.textContent = message;
            
            const icon = toast.querySelector('i');
            if (icon) {
                if (type === 'success') {
                    icon.className = 'fas fa-check-circle';
                } else {
                    icon.className = 'fas fa-exclamation-circle';
                }
            }
            
            toast.classList.remove('hidden');
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 3000);
        }
    </script>
</body>
</html>
