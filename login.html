<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HomeFix</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <!-- Simple Nav for Auth Pages -->
    <nav class="navbar navbar-auth">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-home"></i>
                <span>HomeFix</span>
            </a>
            <a href="index.html" class="btn-back">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </nav>

    <!-- Login Container -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to access your account</p>
            </div>

            <form id="loginForm" class="auth-form">
                <!-- Role Selection -->
                <div class="role-selection">
                    <label class="role-label">I am a:</label>
                    <div class="role-options">
                        <label class="role-option">
                            <input type="radio" name="role" value="customer" id="roleCustomer" checked>
                            <div class="role-card">
                                <i class="fas fa-user"></i>
                                <span>Customer</span>
                                <small>Need home services</small>
                            </div>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="provider" id="roleProvider">
                            <div class="role-card">
                                <i class="fas fa-user-tie"></i>
                                <span>Provider</span>
                                <small>Offer services</small>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Email Input -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="Enter your email"
                            required
                        >
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <!-- Password Input -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <i class="fas fa-arrow-right"></i>
                    <div class="spinner hidden"></div>
                </button>
            </form>

            <!-- Divider -->
            <div class="auth-divider">
                <span>or</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <button class="btn-social btn-google">
                    <i class="fab fa-google"></i>
                    Continue with Google
                </button>
                <button class="btn-social btn-apple">
                    <i class="fab fa-apple"></i>
                    Continue with Apple
                </button>
            </div>

            <!-- Sign Up Link -->
            <div class="auth-footer">
                <p>Don't have an account? <a href="#" class="auth-link">Sign up</a></p>
            </div>
        </div>

        <!-- Decorative Elements -->
        <div class="auth-decoration">
            <div class="decoration-circle circle-1"></div>
            <div class="decoration-circle circle-2"></div>
            <div class="decoration-circle circle-3"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <div class="toast-content">
            <i class="fas fa-check-circle"></i>
            <span id="toastMessage">Login successful!</span>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize login page specific functionality
        document.addEventListener('DOMContentLoaded', function() {
            // Check for pre-selected role from URL
            const urlParams = new URLSearchParams(window.location.search);
            const preselectedRole = urlParams.get('role');
            
            if (preselectedRole === 'provider') {
                document.getElementById('roleProvider').checked = true;
            } else if (preselectedRole === 'customer') {
                document.getElementById('roleCustomer').checked = true;
            }
        });
    </script>
</body>
</html>
